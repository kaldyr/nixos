# System
allow_remote_control yes
listen_on unix:@mykitty
enable_audio_bell no
linux_display_server wayland
inactive_text_alpha 0.7

# Fonts
font_family family="Maple Mono NF" style="Regular"
bold_font family="Maple Mono NF" style="ExtraBold"
italic_font family="Maple Mono NF" style="Italic"
bold_italic_font family="Maple Mono NF" style="Bold Italic"
font_size 10.6
disable_ligatures never
symbol_map U+2070-U+209C Libertinus Mono

# Cursor
cursor_shape beam
cursor_beam_thickness 1.8

# Tab Bar
tab_bar_style powerline
tab_powerline_style round
tab_title_max_length 15
tab_title_template " {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{tab.last_focused_progress_percent} {title}  "

# URLs
detect_urls yes
open_url_with default
url_style curly

# Integrations
editor nvim
scrollback_pager nvim -u NONE -R -M -c 'lua require("kitty")(INPUT_LINE_NUMBER, CURSOR_LINE, CURSOR_COLUMN)' -
scrollback_lines 5000
shell fish
shell_integration enabled

# Layouts
enabled_layouts splits,stack

# Keybindings
clear_all_shortcuts yes

# General
map alt+\          load_config_file
map alt+0          change_font_size all 0
map alt+equal      change_font_size all +1.0
map alt+minus      change_font_size all -1.0
map alt+plus       change_font_size all +8.0
map alt+underscore change_font_size all -8.0

# Scrollback
map alt+u          scroll_page_up
map alt+d          scroll_page_down
map alt+e          show_scrollback

# Hints
map alt+shift+u    kitten hints --type=url

# Tabs
map alt+t          new_tab
map alt+.          next_tab
map alt+,          previous_tab
map alt+shift+t    set_tab_title
map alt+shift+.    move_tab_forward
map alt+shift+,    move_tab_backward

# Windows
map alt+f          toggle_layout stack
map alt+n          launch --cwd=current --location=hsplit --bias 50
map alt+shift+n    launch --cwd=current --location=hsplit --bias 18
map alt+v          launch --cwd=current --location=vsplit --bias 50
map alt+shift+v    launch --cwd=current --location=vsplit --bias 18
map alt+x          close_window
map alt+h          neighboring_window left
map alt+j          neighboring_window down
map alt+k          neighboring_window up
map alt+l          neighboring_window right
map alt+shift+h    move_window left
map alt+shift+j    move_window down
map alt+shift+k    move_window up
map alt+shift+l    move_window right
map alt+left       kitten relative_resize.py left
map alt+down       kitten relative_resize.py down
map alt+up         kitten relative_resize.py up
map alt+right      kitten relative_resize.py right

# Input
# Fighting one-keyed kirby
map alt+i          combine : send_key \ : send_key ( : send_key . : send_key * : send_key \ : send_key )
# Unicode symbols
map alt+u          kitten unicode_input --emoji-variation text --tab name

# Sessions
map alt+q          goto_session --sort-by=alphabetical ~/.config/kitty/sessions
map alt+b          goto_session ~/.config/kitty/sessions/btop.kitty-session
map alt+c          goto_session ~/.config/kitty/sessions/qalc.kitty-session
map alt+y          goto_session ~/.config/kitty/sessions/yazi.kitty-session

# Color scheme

# The basic colors
foreground              #c6d0f5
background              #303446
selection_foreground    #303446
selection_background    #f2d5cf

# Cursor colors
cursor                  #f2d5cf
cursor_text_color       #303446

# Scrollbar colors
scrollbar_handle_color  #949cbb
scrollbar_track_color   #51576d

# URL color when hovering with mouse
url_color               #f2d5cf

# Kitty window border colors
active_border_color     #babbf1
inactive_border_color   #737994
bell_border_color       #e5c890

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #232634
active_tab_background   #ca9ee6
inactive_tab_foreground #c6d0f5
inactive_tab_background #303446
tab_bar_background      #232634

# Colors for marks (marked text in the terminal)
mark1_foreground #303446
mark1_background #babbf1
mark2_foreground #303446
mark2_background #ca9ee6
mark3_foreground #303446
mark3_background #85c1dc

