$vrr = 1
$gaps_in = 9
$gaps_out = 20

$d2width = 2902
$d2height = 1375

monitor=HDMI-A-1, 3440x1440@84.97900, 0x0, 1

exec-once=pamixer --default-source -m
exec-once=wayland-push-to-talk-fix -k 'BTN_MIDDLE' -n 'XF86WheelButton' /dev/input/by-id/usb-Razer_Razer_DeathAdder_Essential-event-mouse
exec-once=nmcli radio wifi off

# Launch terminal apps
bind=SUPER SHIFT, q, exec, [pseudo; size 1000 608; center;] kitty
bind=SUPER CTRL, q, exec, [float; size 1000 608; center;] kitty
bind=SUPER, y, exec, [float; size 1000 608; center;] kitty yazi
bind=SUPER, c, exec, [float; size 420 323; center;] kitty qalc
