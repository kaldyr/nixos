$terminal = kitty
$vrr = 0
$gaps_in = 8
$gaps_out = 16
monitor=eDP-1, 2256x1504@60, auto, 1.175000
bindl= , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl= , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 2256x1504@60, auto, 1.175000"
# exec-once=wayland-push-to-talk-fix -k 'BTN_MIDDLE' -n 'O' /dev/input/by-id/usb-Razer_Razer_DeathAdder_Essential-event-mouse

# Launch terminal apps
bind=SUPER SHIFT, q, exec, [float; size 996 599;] kitty
bind=SUPER, y, exec, [float; size 996 599;] kitty yazi
bind=SUPER, c, exec, [float; size 420 318;] kitty qalc
