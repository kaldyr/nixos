# GENERAL
general {
	hide_cursor = true
}

# ANIMATIONS
animations {
	enabled = true
	bezier = linear, 1, 1, 0, 0
	animation = fadeIn, 1, 5, linear
	animation = fadeOut, 1, 5, linear
	animation = inputFieldDots, 1, 2, linear
}

# BACKGROUND
background {
	monitor =
	path = $HOME/Pictures/Wallpapers/mountain.jpg
	blur_passes = 3
	color = rgb(303446)
}

# TIME
label {
	monitor =
	text = cmd[update:1000] echo "<b>$(date +"%k:%M")</b>"
	color = rgb(c6d0f5)
	font_size = 50
	font_family = Maple Mono NF
	position = -130, -100
	halign = right
	valign = top
	shadow_passes = 2
}

# DATE
label {
	monitor =
	text = cmd[update:1000] echo "$(date +"%A, %B %e %Y")"
	color = rgb(c6d0f5)
	font_size = 20
	font_family = Maple Mono NF
	position = -130, -250
	halign = right
	valign = top
	shadow_passes = 2
}

# USER AVATAR
image {
	monitor =
	path = $HOME/Pictures/Saved/profile.png
	size = 350
	border_color = rgb(85c1dc)
	rounding = -1
	position = 0, 75
	halign = center
	valign = center
	shadow_passes = 2
}

# INPUT FIELD
input-field {
	monitor =
	size = 18%, 4%
	outline_thickness = 3
	dots_size = 0.2
	dots_spacing = 0.4
	dots_center = true
	outer_color = rgba(85c1dcee) rgba(81c8beee)
	inner_color = rgba(303446ee)
	font_color = rgba(a5adceaa)
	font_family = Maple Mono NF
	fade_on_empty = false
	placeholder_text = 󰌾
	hide_input = false
	check_color = rgba(99d1dbee)
	fail_color = rgba(e78284ee)
	fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
	capslock_color = rgb(e5c890)
	position = 0, -185
	halign = center
	valign = center
	shadow_passes = 2
}
